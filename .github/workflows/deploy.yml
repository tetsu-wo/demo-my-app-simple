  name: Deploy to Amazon ECS Express Mode

  on:
    push:
      branches: [ "main" ]

  env:
    AWS_REGION: ap-northeast-1                   # お使いのリージョン
    ECR_REPOSITORY: my-app-repo                   # ECR リポジトリ名
    ECS_SERVICE_NAME: my-express-service          # Express Mode のサービス名

  jobs:
    deploy:
      runs-on: ubuntu-latest
      permissions:
        contents: read
        id-token: write # OIDC認証を使用する場合に必要

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ env.AWS_REGION }}

        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v2

        - name: Build, tag, and push image to Amazon ECR
          id: build-image
          env:
            ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            IMAGE_TAG: ${{ github.sha }}
          run: |
            # イメージのビルドとプッシュ
            docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
            echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
            
        # --- ここから「バックエンド」のデプロイ ---
        - name: Deploy Backend to ECS Express Mode (Create or Update)
          run: |
            # サービスが存在するかチェック
            STATUS=$(aws ecs describe-services --services backend-service --query "services[0].status" --output text 2>/dev/null || echo "MISSING")
        
            if [ "$STATUS" = "ACTIVE" ]; then
              echo "Updating existing Backend service..."
              aws ecs update-express-service --name backend-service --image-uri <バックエンドのイメージURI>
            else
              echo "Creating new Backend service..."
              aws ecs create-express-service --name backend-service --image-uri <バックエンドのイメージURI>
            fi

        # --- ここから「フロントエンド」のデプロイ ---
        - name: Deploy Frontend to ECS Express Mode (Create or Update)
          run: |
            # サービスが存在するかチェック
            STATUS=$(aws ecs describe-services --services frontend-service --query "services[0].status" --output text 2>/dev/null || echo "MISSING")
        
            if [ "$STATUS" = "ACTIVE" ]; then
              echo "Updating existing Frontend service..."
              aws ecs update-express-service --name frontend-service --image-uri <フロントエンドのイメージURI>
            else
              echo "Creating new Frontend service..."
              aws ecs create-express-service --name frontend-service --image-uri <フロントエンドのイメージURI>
            fi