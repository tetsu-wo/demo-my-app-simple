  name: Deploy to Amazon ECS Express Mode

  on:
    push:
      branches: [ "main" ]

  env:
    AWS_REGION: ap-northeast-1
    ECR_REPOSITORY_BACKEND: my-app-backend    # バックエンド用リポジトリ名
    ECR_REPOSITORY_FRONTEND: my-app-frontend  # フロントエンド用リポジトリ名
    SERVICE_NAME_BACKEND: backend-service     # AWS上のサービス名
    SERVICE_NAME_FRONTEND: frontend-service   # AWS上のサービス名

  jobs:
    deploy:
      runs-on: ubuntu-latest
      permissions:
        contents: read
        id-token: write # OIDC認証を使用する場合に必要

      steps:

        - name: Checkout
          uses: actions/checkout@v4

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ env.AWS_REGION }}

        - name: Debug ECS Info
          run: |
            echo "Target Cluster: ${{ secrets.ECS_CLUSTER_NAME }}"
            echo "Target Service: backend-service"
            aws ecs list-clusters
            aws sts get-caller-identity

        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v2

        - name: Grant execute permission for gradlew
          run: chmod +x ./backend/gradlew

        - name: Build and Push Backend Image
          id: build-backend
          env:
            ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            IMAGE_TAG: ${{ github.sha }}
          run: |
            # バックエンドのディレクトリに移動してビルドする場合
            docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY_BACKEND }}:$IMAGE_TAG ./backend
            docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY_BACKEND }}:$IMAGE_TAG
            echo "image=$ECR_REGISTRY/${{ env.ECR_REPOSITORY_BACKEND }}:$IMAGE_TAG" >> $GITHUB_OUTPUT
            
        # --- フロントエンドのビルドとプッシュ ---
        - name: Build and Push Frontend Image
          id: build-frontend
          env:
            ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            IMAGE_TAG: ${{ github.sha }}
          run: |
            # フロントエンドのディレクトリに移動してビルドする場合
            docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY_FRONTEND }}:$IMAGE_TAG ./frontend
            docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY_FRONTEND }}:$IMAGE_TAG
            echo "image=$ECR_REGISTRY/${{ env.ECR_REPOSITORY_FRONTEND }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

        # --- ここから「バックエンド」のデプロイ ---
#
        - name: Deploy Backend (Create or Update)
          uses: aws-actions/amazon-ecs-deploy-express-service@v1
          with:
            cluster: ${{ secrets.ECS_CLUSTER_NAME }}
            service-name: "backend-service" # サービス名
            image: ${{ steps.build-backend.outputs.image }} # ビルドしたイメージ
            container-port: 8080
            min-task-count: 1  # 起動するタスクの数を指定
            max-task-count: 1
            wait-for-minutes: 5
            # ★これを追加（ECSがECRからイメージを引くための権限ロール）
            execution-role-arn: ${{ secrets.ECS_EXECUTION_ROLE_ARN }}
            # ★これを追加
            infrastructure-role-arn: ${{ secrets.ECS_INFRASTRUCTURE_ROLE_ARN }}
            # --- ↓ 新規作成時に必須となる可能性が高い項目 ---
            cpu: 256
            memory: 512
            subnets: "subnet-06b7f26151f215ccc,subnet-0ce940b40a21078d0,subnet-0e79077ff070e3a79"  # "subnet-xxxx,subnet-yyyy" の形式
            security-groups: sg-07248ad9614a9fbc0  # "sg-xxxx" の形式


        # --- ここから「フロントエンド」のデプロイ ---
#        - name: Deploy Frontend to ECS Express Mode (Create or Update)
#          run: |
#            # サービスが存在するかチェック
#            STATUS=$(aws ecs describe-services --services frontend-service --query "services[0].status" --output text 2>/dev/null || echo "MISSING")
#
#            if [ "$STATUS" = "ACTIVE" ]; then
#              echo "Updating existing Frontend service..."
#              aws ecs update-express-service --name frontend-service --image-uri ${{ steps.build-frontend.outputs.image }}
#            else
#              echo "Creating new Frontend service..."
#              aws ecs create-express-service --name frontend-service --image-uri ${{ steps.build-frontend.outputs.image }}
#            fi
        - name: Deploy Frontend (Create or Update)
          uses: aws-actions/amazon-ecs-deploy-express-service@v1
          with:
            cluster: ${{ secrets.ECS_CLUSTER_NAME }}
            service-name: "frontend-service"
            image: ${{ steps.build-frontend.outputs.image }}
            # ★これを追加（ECSがECRからイメージを引くための権限ロール）
            execution-role-arn: ${{ secrets.ECS_EXECUTION_ROLE_ARN }}
            # ★これを追加
            infrastructure-role-arn: ${{ secrets.ECS_INFRASTRUCTURE_ROLE_ARN }}
            # --- ↓ 新規作成時に必須となる可能性が高い項目 ---
            cpu: 256
            memory: 512
            vpc-id: ${{ secrets.VPC_ID }} # vpc-xxxxxx 形式
