  name: Deploy to Amazon ECS Express Mode

  on:
    push:
      branches: [ "main" ]

  env:
    AWS_REGION: ap-northeast-1
    ECR_REPOSITORY_BACKEND: my-app-backend    # バックエンド用リポジトリ名
    ECR_REPOSITORY_FRONTEND: my-app-frontend  # フロントエンド用リポジトリ名
    SERVICE_NAME_BACKEND: backend-service     # AWS上のサービス名
    SERVICE_NAME_FRONTEND: frontend-service   # AWS上のサービス名

  jobs:
    deploy-backend:
      runs-on: ubuntu-latest
      permissions:
        contents: read
        id-token: write # OIDC認証を使用する場合に必要

      steps:

        - name: Checkout
          uses: actions/checkout@v4

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ env.AWS_REGION }}

        - name: Debug ECS Info
          run: |
            echo "Target Cluster: ${{ secrets.ECS_CLUSTER_NAME }}"
            echo "Target Service: backend-service"
            aws ecs list-clusters
            aws sts get-caller-identity

        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v2

        - name: Grant execute permission for gradlew
          run: chmod +x ./backend/gradlew

        - name: Build and Push Backend Image
          id: build-backend
          env:
            ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            IMAGE_TAG: ${{ github.sha }}
          run: |
            
          # ★ここに追加！最新のプログラムをコンパイルしてjarを作る
            chmod +x gradlew
            ./gradlew clean build -x test 
          
          # バックエンドのディレクトリに移動してビルドする場合
            docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY_BACKEND }}:$IMAGE_TAG ./backend
            docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY_BACKEND }}:$IMAGE_TAG
            echo "image=$ECR_REGISTRY/${{ env.ECR_REPOSITORY_BACKEND }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

        # 4. タスク定義ファイルのイメージタグを更新
        - name: Fill in the new image ID in the Amazon ECS task definition
          id: task-def
          uses: aws-actions/amazon-ecs-render-task-definition@v1
          with:
            task-definition: backend/.aws/task-definition.json
            container-name: backend-container
            image: ${{ steps.build-backend.outputs.image }}

        - name: Ensure ECS Service exists
          run: |
            # 1. クラスターが存在するか確認。なければ作成
            if ! aws ecs describe-clusters --clusters my-app-default2 | grep -q "ACTIVE"; then
             echo "Cluster 'default' not found. Creating..."
             aws ecs create-cluster --cluster my-app-default2
            # クラスターが完全に作成されるまで10秒待機
             echo "Waiting for cluster to be active..."
             sleep 10
            fi            
            
            # サービスが存在するか確認。なければ作成するコマンドを実行
            if ! aws ecs describe-services --cluster my-app-default2 --services service-backend | grep -q "ACTIVE"; then
              echo "Service does not exist. Creating..."
              aws ecs create-service \
                --cluster my-app-default2 \
                --service-name service-backend \
                --task-definition backend-task \
                --desired-count 1 \
                --launch-type FARGATE \
                --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.SUBNET_IDS }}],securityGroups=[${{ secrets.SECURITY_GROUP_IDS }}],assignPublicIp=ENABLED}"
            else
              echo "Service already exists."
            fi

        # 5. ECS サービスを更新してデプロイ
        - name: Deploy Amazon ECS task definition
          uses: aws-actions/amazon-ecs-deploy-task-definition@v2
          with:
            task-definition: ${{ steps.task-def.outputs.task-definition }}
            service: ${{ env.ECS_SERVICE }}
            cluster: ${{ env.ECS_CLUSTER }}
            wait-for-service-stability: true # デプロイ完了まで待機

    deploy-frontend:
      runs-on: ubuntu-latest
      permissions:
        contents: read
        id-token: write # OIDC認証を使用する場合に必要

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ env.AWS_REGION }}

        - name: Debug ECS Info
          run: |
            echo "Target Cluster: ${{ secrets.ECS_CLUSTER_NAME }}"
            echo "Target Service: backend-service"
            aws ecs list-clusters
            aws sts get-caller-identity

        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v2

        - name: Grant execute permission for gradlew
          run: chmod +x ./backend/gradlew

        # --- フロントエンドのビルドとプッシュ ---
        - name: Build and Push Frontend Image
          id: build-frontend
          env:
            ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            IMAGE_TAG: ${{ github.sha }}
          run: |
            # フロントエンドのディレクトリに移動してビルドする場合
            docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY_FRONTEND }}:$IMAGE_TAG ./frontend
            docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY_FRONTEND }}:$IMAGE_TAG
            echo "image=$ECR_REGISTRY/${{ env.ECR_REPOSITORY_FRONTEND }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

        # 4. タスク定義ファイルのイメージタグを更新
        - name: Fill in the new image ID in the Amazon ECS task definition
          id: task-def
          uses: aws-actions/amazon-ecs-render-task-definition@v1
          with:
            task-definition: frontend/.aws/task-definition.json
            container-name: frontend-container
            image: ${{ steps.build-frontend.outputs.image }}

        - name: Ensure Frontend ECS Service exists
          run: |
            # 1. クラスターが存在するか確認。なければ作成
            if ! aws ecs describe-clusters --clusters my-app-default2 | grep -q "ACTIVE"; then
             echo "Cluster 'default' not found. Creating..."
             aws ecs create-cluster --cluster my-app-default2
            # クラスターが完全に作成されるまで10秒待機
             echo "Waiting for cluster to be active..."
             sleep 10
            fi               
            
            # サービスがなければ作成（クラスター確認はbackend側でもやるので念のため）
            if ! aws ecs describe-services --cluster my-app-default2 --services frontend-service | grep -q "ACTIVE"; then
              aws ecs create-service \
                --cluster my-app-default2 \
                --service-name frontend-service \
                --task-definition frontend-task \
                --desired-count 1 \
                --launch-type FARGATE \
                --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.SUBNET_IDS }}],securityGroups=[${{ secrets.SECURITY_GROUP_IDS }}],assignPublicIp=ENABLED}"
            fi

        # 5. ECS サービスを更新してデプロイ
        - name: Deploy Amazon ECS task definition
          uses: aws-actions/amazon-ecs-deploy-task-definition@v2
          with:
            task-definition: ${{ steps.task-def.outputs.task-definition }}
            service: ${{ env.ECS_SERVICE }}
            cluster: ${{ env.ECS_CLUSTER }}
            wait-for-service-stability: true # デプロイ完了まで待機

